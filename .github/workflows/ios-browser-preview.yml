name: Build iOS Browser Preview

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "agent/**"
      - "codex/**"
    paths:
      - ".github/workflows/ios-browser-preview.yml"
      - "YouDuMa/**"
      - "YouDuMaTests/**"
      - "project.yml"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-simulator-app:
    name: Build simulator app
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project YouDuMa.xcodeproj \
            -scheme YouDuMa \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild.log

      - name: Validate catalog data
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          plants = json.loads(Path("YouDuMa/Resources/Data/aspca_plants_v1.json").read_text(encoding="utf-8"))
          metadata = json.loads(Path("YouDuMa/Resources/Data/aspca_database_metadata.json").read_text(encoding="utf-8"))
          assert len(plants) == metadata["plantCount"]
          assert len({plant["id"] for plant in plants}) == len(plants)
          assert all(
              not set(plant["toxicTo"]) & set(plant["nonToxicTo"])
              for plant in plants
          )
          assert all(re.search(r"[\u3400-\u9fff]", plant["chineseName"]) for plant in plants)
          assert all(plant["acceptedScientificName"] for plant in plants)
          assert all(plant["pinyin"] for plant in plants)
          assert sum(plant["nameNeedsReview"] for plant in plants) == metadata["nameEnrichment"]["needsReviewCount"]
          assert all(plant["image"] for plant in plants)
          assert all(plant["image"]["thumbnailURL"].startswith("https://") for plant in plants)
          assert all(
              plant["image"]["thumbnailURL"].lower().split("?")[0].endswith((".jpg", ".jpeg"))
              for plant in plants
          )
          assert all(plant["image"]["author"] and plant["image"]["license"] for plant in plants)
          assert sum(plant["image"]["needsReview"] for plant in plants) == metadata["imageEnrichment"]["needsReviewCount"]
          assert metadata["imageEnrichment"]["imageCount"] == len(plants)
          assert len(plants) > 900
          print(f"Validated {len(plants)} catalog records")
          PY

      - name: Verify catalog is bundled
        run: |
          APP_PATH="build/Build/Products/Debug-iphonesimulator/YouDuMa.app"
          CATALOG_PATH=$(find "$APP_PATH" -name aspca_plants_v1.json -print -quit)
          METADATA_PATH=$(find "$APP_PATH" -name aspca_database_metadata.json -print -quit)
          test -n "$CATALOG_PATH"
          test -n "$METADATA_PATH"
          echo "Catalog: $CATALOG_PATH"
          echo "Metadata: $METADATA_PATH"

      - name: Package Appetize build
        run: |
          APP_PATH="build/Build/Products/Debug-iphonesimulator/YouDuMa.app"
          test -d "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" YouDuMa-simulator.zip

      - name: Compile unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project YouDuMa.xcodeproj \
            -scheme YouDuMa \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build-tests \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing | tee xctest-build.log

      - name: Upload simulator app
        uses: actions/upload-artifact@v4
        with:
          name: YouDuMa-iOS-Simulator
          path: YouDuMa-simulator.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: YouDuMa-xcodebuild-log
          path: |
            xcodebuild.log
            xctest-build.log
          if-no-files-found: ignore
          retention-days: 7
