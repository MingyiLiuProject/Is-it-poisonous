name: YouDuMa
options:
  bundleIdPrefix: ch.basel.mingyi
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  YouDuMa:
    type: application
    platform: iOS
    sources:
      - path: YouDuMa
        excludes:
          - Resources/Data
      - path: YouDuMa/Resources/Data
        buildPhase: resources
    info:
      path: YouDuMa/Info.plist
      properties:
        CFBundleDisplayName: 有毒吗
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsIndirectInputEvents: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.basel.mingyi.youduma
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
  YouDuMaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: YouDuMaTests
    dependencies:
      - target: YouDuMa
